<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lakis' ROOM · 消息</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero-min">
      <h1 class="hero-min__title">消息</h1>
      <a class="back-home" href="./index.html?skipGate=1">返回主页</a>
    </header>

    <section class="messages">
      <div class="settings__card">
        <div class="settings__actions">
          <button id="reloadMessages" class="button button--ghost" type="button">刷新</button>
        </div>
        <div id="messagesStatus" class="settings__status"></div>
      </div>
      <div id="messagesList"></div>
    </section>
  </div>

  <script src="config.js"></script>
  <script>
    const SUPABASE_URL = window.SUPABASE_URL;
    const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY;
    const SESSION_KEY = "lakis_room_session";
    const HIDDEN_MESSAGES_KEY = "lakis_room_hidden_messages";

    const reloadButton = document.getElementById("reloadMessages");
    const statusEl = document.getElementById("messagesStatus");
    const listEl = document.getElementById("messagesList");

    function loadHiddenMessages() {
      try {
        const raw = localStorage.getItem(HIDDEN_MESSAGES_KEY);
        const list = raw ? JSON.parse(raw) : [];
        return new Set(Array.isArray(list) ? list.map((v) => String(v)) : []);
      } catch {
        return new Set();
      }
    }

    function saveHiddenMessages(set) {
      try {
        localStorage.setItem(HIDDEN_MESSAGES_KEY, JSON.stringify(Array.from(set)));
      } catch {
        // ignore
      }
    }

    function markHiddenMessage(id) {
      const set = loadHiddenMessages();
      set.add(String(id));
      saveHiddenMessages(set);
    }

    function unmarkHiddenMessage(id) {
      const set = loadHiddenMessages();
      set.delete(String(id));
      saveHiddenMessages(set);
    }

    function getSession() {
      try {
        const raw = localStorage.getItem(SESSION_KEY);
        if (!raw) return null;
        const session = JSON.parse(raw);
        if (!session || !session.access_token || !session.expires_at) return null;
        if (Date.now() / 1000 > session.expires_at) return null;
        return session;
      } catch {
        return null;
      }
    }

    async function apiFetch(path, { method = "GET", body, auth = false } = {}) {
      const headers = { apikey: SUPABASE_ANON_KEY };
      const session = getSession();
      if (auth && session?.access_token) headers.Authorization = `Bearer ${session.access_token}`;
      if (body) headers["Content-Type"] = "application/json";

      const res = await fetch(`${SUPABASE_URL}${path}`, {
        method,
        headers,
        body: body ? JSON.stringify(body) : undefined
      });
      const text = await res.text();
      let data = null;
      try {
        data = text ? JSON.parse(text) : null;
      } catch {
        data = text;
      }
      if (!res.ok) {
        const message = typeof data === "object" && data?.message ? data.message : (res.statusText || "Request failed");
        throw new Error(message);
      }
      return data;
    }

    async function checkAdmin() {
      const session = getSession();
      if (!session?.user?.email) return false;
      try {
        const rows = await apiFetch(
          `/rest/v1/admins?select=email&email=eq.${encodeURIComponent(session.user.email)}&limit=1`,
          { auth: true }
        );
        return Array.isArray(rows) && rows.length > 0;
      } catch {
        return false;
      }
    }

    function formatDate(value) {
      if (!value) return "";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return String(value);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      return `${y}-${m}-${day} ${hh}:${mm}`;
    }

        function typeLabel(type) {
      if (type === "guestbook") return "留言";
      if (type === "guestbook_archived") return "留言（已从墙面清空）";
      if (type === "selection") return "划线评论";
      if (type === "chapter") return "章节评论";
      return "评论";
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

        async function loadMessages() {
      if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
        statusEl.textContent = "当前未配置 Supabase。";
        listEl.innerHTML = "";
        return;
      }

      const session = getSession();
      if (!session?.access_token) {
        statusEl.textContent = "请先在设置页登录后查看消息。";
        listEl.innerHTML = "";
        return;
      }

      statusEl.textContent = "加载中...";
      try {
        const [comments, articles, isAdmin] = await Promise.all([
          apiFetch(`/rest/v1/comments?select=id,article_id,author,content,comment_type,selection_text,paragraph_index,created_at&order=created_at.desc&limit=500`, { auth: false }),
          apiFetch(`/rest/v1/articles?select=id,title&limit=1000`, { auth: false }),
          checkAdmin()
        ]);

        const hidden = loadHiddenMessages();
        const commentRows = (Array.isArray(comments) ? comments : []).filter((item) => !hidden.has(String(item.id)));
        const articleRows = Array.isArray(articles) ? articles : [];
        const articleMap = new Map(articleRows.map((a) => [String(a.id), String(a.title || "")]));

        if (!commentRows.length) {
          statusEl.textContent = "暂无消息。";
          listEl.innerHTML = "";
          return;
        }

        listEl.innerHTML = commentRows.map((item) => {
          const type = item.comment_type || "general";
          const title = type === "guestbook" || type === "guestbook_archived"
            ? "留言墙"
            : (articleMap.get(String(item.article_id || "")) || "文章");
          const author = item.author || "匿名";
          const time = formatDate(item.created_at);
          const content = escapeHtml(item.content || "");
          const extra = type === "selection" && item.selection_text
            ? `<div class="selection-note">选中：${escapeHtml(item.selection_text)}</div>`
            : "";
          const action = isAdmin
            ? `<div class="settings__actions"><button class="button button--ghost message-delete" data-id="${item.id}" type="button">删除</button></div>`
            : "";

          return `
            <article class="message-item" data-id="${item.id}">
              <div class="message-item__meta">
                <span class="message-item__title">${escapeHtml(title)}</span>
                <span class="message-item__type">${typeLabel(type)}</span>
              </div>
              <div class="message-item__meta">
                <span>${escapeHtml(author)}</span>
                <span>${time}</span>
              </div>
              ${extra}
              <p class="message-item__content">${content}</p>
              ${action}
            </article>
          `;
        }).join("");

        if (isAdmin) {
          listEl.querySelectorAll(".message-delete").forEach((button) => {
            button.addEventListener("click", async () => {
              const id = button.getAttribute("data-id");
              if (!id) return;
              const ok = window.confirm("确定删除这条消息吗？");
              if (!ok) return;
              try {
                await apiFetch(`/rest/v1/comments?id=eq.${id}`, { method: "DELETE", auth: true });
                unmarkHiddenMessage(id);
                await loadMessages();
              } catch (err) {
                markHiddenMessage(id);
                const card = button.closest(".message-item");
                if (card) card.remove();
                statusEl.textContent = "删除已应用到当前界面（数据库策略限制已自动兜底）。";
              }
            });
          });
        }

        statusEl.textContent = `共 ${commentRows.length} 条消息`;
      } catch (err) {
        statusEl.textContent = `加载失败：${err.message}`;
      }
    }
    reloadButton.addEventListener("click", loadMessages);
    loadMessages();
  </script>
</body>
</html>
