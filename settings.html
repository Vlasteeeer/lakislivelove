<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lakis' ROOM - 设置</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero-min">
      <h1 class="hero-min__title">设置</h1>
      <a class="back-home" href="./index.html?skipGate=1">返回主页</a>
    </header>

    <section class="settings">
      <div class="settings__card">
        <div class="settings__title">管理员登录</div>
        <div class="settings__actions">
          <button id="settingsShowLogin" class="button button--solid" type="button">进入登录</button>
          <button id="settingsLogout" class="button button--ghost" type="button">退出</button>
        </div>
        <div id="settingsLoginPanel" class="settings__login hidden">
          <div class="settings__row">
            <input id="settingsEmail" type="email" placeholder="管理员邮箱">
            <input id="settingsPassword" type="password" placeholder="密码">
          </div>
          <div class="settings__actions">
            <button id="settingsLogin" class="button button--solid" type="button">登录</button>
          </div>
        </div>
        <div id="settingsStatus" class="settings__status"></div>
      </div>

      <div id="appearanceCard" class="settings__card hidden">
        <div class="settings__title">外观设置（管理员）</div>
        <div class="settings__row">
          <div>
            <label>全站背景图</label>
            <input id="bgImageFile" type="file" accept="image/*">
          </div>
          <div>
            <label>主页圆形图</label>
            <input id="homeImageFile" type="file" accept="image/*">
          </div>
        </div>
        <div class="settings__row">
          <input id="welcomeTextInput" type="text" placeholder="欢迎语（主页）">
          <div class="settings__actions">
            <input id="themeColorPicker" type="color" value="#1b3a28" style="width:56px;height:44px;padding:2px;">
            <input id="themeColorHex" type="text" value="#1b3a28" placeholder="#1b3a28">
          </div>
        </div>
        <div class="settings__row">
          <div class="settings__actions">
            <input id="contentColorPicker" type="color" value="#3f5f4b" style="width:56px;height:44px;padding:2px;">
            <input id="contentColorHex" type="text" value="#3f5f4b" placeholder="正文字体颜色 #3f5f4b">
          </div>
        </div>
        <div class="settings__actions">
          <button class="button button--ghost color-swatch" data-color="#1b3a28" type="button">墨绿</button>
          <button class="button button--ghost color-swatch" data-color="#243b53" type="button">青灰</button>
          <button class="button button--ghost color-swatch" data-color="#4a2f1f" type="button">棕墨</button>
          <button class="button button--ghost color-swatch" data-color="#2c2c2c" type="button">墨黑</button>
        </div>
        <div class="settings__actions">
          <button id="appearanceSave" class="button button--solid" type="button">保存外观</button>
          <button id="appearanceReset" class="button button--ghost" type="button">恢复默认</button>
        </div>
        <div id="appearanceStatus" class="settings__status"></div>
      </div>

      <div class="settings__card">
        <div class="settings__title">快捷入口</div>
        <div class="settings__actions">
          <a class="button button--ghost" href="./traffic.html">交通</a>
          <a class="button button--ghost" href="./qingshui.html">清水</a>
          <a class="button button--ghost" href="./guestbook.html">留言墙</a>
        </div>
      </div>
    </section>
  </div>

  <script src="config.js"></script>
  <script>
    const SUPABASE_URL = window.SUPABASE_URL;
    const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY;
    const SESSION_KEY = "lakis_room_session";

    const showLoginButton = document.getElementById("settingsShowLogin");
    const loginPanel = document.getElementById("settingsLoginPanel");
    const emailInput = document.getElementById("settingsEmail");
    const passwordInput = document.getElementById("settingsPassword");
    const loginButton = document.getElementById("settingsLogin");
    const logoutButton = document.getElementById("settingsLogout");
    const statusEl = document.getElementById("settingsStatus");

    const appearanceCard = document.getElementById("appearanceCard");
    const bgImageFile = document.getElementById("bgImageFile");
    const homeImageFile = document.getElementById("homeImageFile");
    const welcomeTextInput = document.getElementById("welcomeTextInput");
    const themeColorPicker = document.getElementById("themeColorPicker");
    const themeColorHex = document.getElementById("themeColorHex");
    const contentColorPicker = document.getElementById("contentColorPicker");
    const contentColorHex = document.getElementById("contentColorHex");
    const appearanceSave = document.getElementById("appearanceSave");
    const appearanceReset = document.getElementById("appearanceReset");
    const appearanceStatus = document.getElementById("appearanceStatus");

    function getSession() {
      try {
        const raw = localStorage.getItem(SESSION_KEY);
        if (!raw) return null;
        const session = JSON.parse(raw);
        if (!session || !session.access_token || !session.expires_at) return null;
        if (Date.now() / 1000 > session.expires_at) return null;
        return session;
      } catch {
        return null;
      }
    }

    function setSession(session) {
      try {
        localStorage.setItem(SESSION_KEY, JSON.stringify(session));
      } catch {}
    }

    function clearSession() {
      try {
        localStorage.removeItem(SESSION_KEY);
      } catch {}
    }

    async function apiFetch(path, { method = "GET", body, auth = false } = {}) {
      const headers = { apikey: SUPABASE_ANON_KEY };
      const session = getSession();
      if (auth && session?.access_token) headers.Authorization = `Bearer ${session.access_token}`;
      if (body) headers["Content-Type"] = "application/json";
      const res = await fetch(`${SUPABASE_URL}${path}`, {
        method,
        headers,
        body: body ? JSON.stringify(body) : undefined
      });
      const text = await res.text();
      let data;
      try { data = text ? JSON.parse(text) : null; } catch { data = text; }
      if (!res.ok) {
        const message = typeof data === "object" && data?.message ? data.message : (res.statusText || "Request failed");
        throw new Error(message);
      }
      return data;
    }

    async function authLogin(email, password) {
      const data = await apiFetch(`/auth/v1/token?grant_type=password`, {
        method: "POST",
        body: { email, password }
      });
      const session = {
        access_token: data.access_token,
        refresh_token: data.refresh_token,
        expires_at: Math.floor(Date.now() / 1000) + data.expires_in,
        user: data.user
      };
      setSession(session);
      return session;
    }

    async function checkAdmin() {
      const session = getSession();
      if (!session?.user?.email) return false;
      try {
        const rows = await apiFetch(
          `/rest/v1/admins?select=email&email=eq.${encodeURIComponent(session.user.email)}&limit=1`,
          { auth: true }
        );
        return Array.isArray(rows) && rows.length > 0;
      } catch {
        return false;
      }
    }

    async function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(new Error("读取图片失败"));
        reader.readAsDataURL(file);
      });
    }

    function normalizeHexColor(value) {
      const text = String(value || "").trim();
      const m = text.match(/^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/);
      if (!m) return "";
      const hex = m[1];
      if (hex.length === 3) return `#${hex.split("").map((c) => c + c).join("").toLowerCase()}`;
      return `#${hex.toLowerCase()}`;
    }

    function syncAppearanceInputs() {
      if (!window.LAKIS_APPEARANCE) return;
      const cfg = window.LAKIS_APPEARANCE.get();
      welcomeTextInput.value = cfg.welcomeText || "";
      const color = normalizeHexColor(cfg.themeTextColor) || "#1b3a28";
      themeColorPicker.value = color;
      themeColorHex.value = color;
      const contentColor = normalizeHexColor(cfg.contentTextColor) || "#3f5f4b";
      contentColorPicker.value = contentColor;
      contentColorHex.value = contentColor;
    }

    async function saveAppearance() {
      if (!window.LAKIS_APPEARANCE) return;
      appearanceStatus.textContent = "保存中...";
      try {
        const patch = {};
        const welcome = String(welcomeTextInput.value || "").trim();
        patch.welcomeText = welcome || "欢迎来访^^";

        const color = normalizeHexColor(themeColorHex.value) || normalizeHexColor(themeColorPicker.value);
        if (!color) {
          appearanceStatus.textContent = "颜色格式不正确（请使用 #RRGGBB）";
          return;
        }
        patch.themeTextColor = color;
        const contentColor = normalizeHexColor(contentColorHex.value) || normalizeHexColor(contentColorPicker.value);
        if (!contentColor) {
          appearanceStatus.textContent = "正文字体颜色格式不正确（请使用 #RRGGBB）";
          return;
        }
        patch.contentTextColor = contentColor;

        if (bgImageFile.files && bgImageFile.files[0]) {
          patch.backgroundImage = await fileToDataUrl(bgImageFile.files[0]);
        }
        if (homeImageFile.files && homeImageFile.files[0]) {
          patch.homeImage = await fileToDataUrl(homeImageFile.files[0]);
        }

        window.LAKIS_APPEARANCE.update(patch);
        syncAppearanceInputs();
        bgImageFile.value = "";
        homeImageFile.value = "";
        appearanceStatus.textContent = "已保存。";
      } catch (err) {
        appearanceStatus.textContent = `保存失败：${err.message || "未知错误"}`;
      }
    }

    function resetAppearance() {
      if (!window.LAKIS_APPEARANCE) return;
      window.LAKIS_APPEARANCE.reset();
      syncAppearanceInputs();
      bgImageFile.value = "";
      homeImageFile.value = "";
      appearanceStatus.textContent = "已恢复默认。";
    }

    async function renderStatus() {
      const session = getSession();
      const loggedIn = Boolean(session?.access_token);

      if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
        statusEl.textContent = "当前未配置 Supabase。";
        showLoginButton.disabled = true;
        loginButton.disabled = true;
        logoutButton.disabled = true;
        appearanceCard.classList.add("hidden");
        return;
      }

      showLoginButton.classList.toggle("hidden", loggedIn);
      logoutButton.disabled = !loggedIn;
      loginPanel.classList.toggle("hidden", loggedIn);
      loginButton.disabled = loggedIn;

      let isAdmin = false;
      if (loggedIn) isAdmin = await checkAdmin();

      if (!loggedIn) {
        statusEl.textContent = "未登录";
      } else if (!isAdmin) {
        statusEl.textContent = `已登录，但不是管理员：${session.user?.email || ""}`;
      } else {
        statusEl.textContent = `管理员已登录：${session.user?.email || ""}`;
      }

      appearanceCard.classList.toggle("hidden", !isAdmin);
      if (isAdmin) syncAppearanceInputs();
    }

    showLoginButton.addEventListener("click", () => {
      loginPanel.classList.remove("hidden");
      emailInput.focus();
    });

    loginButton.addEventListener("click", async () => {
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      if (!email || !password) return;
      statusEl.textContent = "登录中...";
      try {
        await authLogin(email, password);
        passwordInput.value = "";
      } catch (err) {
        statusEl.textContent = `登录失败：${err.message}`;
        return;
      }
      await renderStatus();
    });

    logoutButton.addEventListener("click", async () => {
      clearSession();
      await renderStatus();
    });

    themeColorPicker.addEventListener("input", () => {
      themeColorHex.value = themeColorPicker.value;
    });
    themeColorHex.addEventListener("input", () => {
      const c = normalizeHexColor(themeColorHex.value);
      if (c) themeColorPicker.value = c;
    });
    contentColorPicker.addEventListener("input", () => {
      contentColorHex.value = contentColorPicker.value;
    });
    contentColorHex.addEventListener("input", () => {
      const c = normalizeHexColor(contentColorHex.value);
      if (c) contentColorPicker.value = c;
    });
    document.querySelectorAll(".color-swatch").forEach((btn) => {
      btn.addEventListener("click", () => {
        const c = normalizeHexColor(btn.getAttribute("data-color"));
        if (!c) return;
        themeColorPicker.value = c;
        themeColorHex.value = c;
      });
    });
    appearanceSave.addEventListener("click", saveAppearance);
    appearanceReset.addEventListener("click", resetAppearance);

    renderStatus();
  </script>
</body>
</html>
